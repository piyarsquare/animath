name: Deploy demo

on:
  push:
    branches: [main]
  schedule:
    - cron: '0 6 * * *'   # daily: refresh the control center with other branches' new reports
  workflow_dispatch:

permissions:
  contents: read
  pages: write
  id-token: write

concurrency:
  group: 'pages'
  cancel-in-progress: true

jobs:
  build:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
        with:
          fetch-depth: 0          # full history so build-sessions can read every branch tip
      - run: git fetch origin "+refs/heads/*:refs/remotes/origin/*"
      - uses: actions/setup-node@v4
        with:
          node-version: '20'
          cache: 'npm'
      - run: npm ci
        env:
          # The Pages build doesn't screenshot anything; skip puppeteer's
          # ~150MB Chrome download (the cloud session installs it explicitly).
          PUPPETEER_SKIP_DOWNLOAD: 'true'
      - run: npm run build
      - run: npm run sessions          # cross-branch control center → docs/sessions/{control-center.html,converted/}
      - run: node docs/sessions/copy-sessions-to-dist.mjs   # → dist/sessions/ (noindex, off to the side)
      - uses: actions/configure-pages@v4
      - uses: actions/upload-pages-artifact@v3
        with:
          path: ./dist
  deploy:
    needs: build
    runs-on: ubuntu-latest
    environment:
      name: github-pages
      url: ${{ steps.deployment.outputs.page_url }}
    steps:
      - id: deployment
        uses: actions/deploy-pages@v4

